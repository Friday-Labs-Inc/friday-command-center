%% Friday Command Center broker topic ACL (EMQX 5 file authorizer).
%%
%% Clients authenticate with an mTLS cert; the bridge and each rover set their MQTT
%% clientid to their identity (= cert CN). Production should additionally bind clientid
%% to the cert via peer_cert_as_clientid=cn on the SSL listener so the clientid can't be
%% spoofed by another valid cert holder. With authorization.no_match=deny, anything not
%% explicitly allowed below is rejected.

%% The bridge: publish commands to any rover, subscribe all telemetry + acks.
{allow, {clientid, "fcc-bridge"}, publish, ["mark1/+/cmd/#"]}.
{allow, {clientid, "fcc-bridge"}, subscribe, ["mark1/+/tlm/#", "mark1/+/ack/#"]}.

%% CQRS: the read-only gateway subscribes telemetry + acks and NEVER publishes.
{allow, {clientid, "fcc-gateway"}, subscribe, ["mark1/+/tlm/#", "mark1/+/ack/#"]}.

%% The command dispatcher publishes operator-signed commands and NEVER subscribes.
{allow, {clientid, "fcc-dispatch"}, publish, ["mark1/+/cmd/#"]}.

%% A rover (clientid = its rover_id): publish ONLY its own telemetry + acks,
%% subscribe ONLY its own commands.
{allow, {clientid, "MARK1-001"}, publish, ["mark1/MARK1-001/tlm/#", "mark1/MARK1-001/ack/#"]}.
{allow, {clientid, "MARK1-001"}, subscribe, ["mark1/MARK1-001/cmd/#"]}.

%% Everything else is denied.
{deny, all}.
